# 🤖 Libris CI/CD Automation Pipeline
# Purpose: High-speed automated verification for every push or PR.

name: Libris Engineering Excellence

on:
  # push:
  #   branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  # ── 🛡️ Backend CI (Python/Flask) ───────────────────────────────────────────
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Static Analysis (Linting)
        run: |
          pip install ruff
          ruff check backend/
      - name: Unit Tests (Pytest)
        run: |
          cd backend
          pytest tests/

  # ── 🛡️ Frontend CI (Flutter/Dart) ──────────────────────────────────────────
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Matches project stable
          channel: 'stable'
      - name: Install Dependencies
        run: |
          cd mobile/flutter_app
          flutter pub get
      - name: Static Analysis
        run: |
          cd mobile/flutter_app
          flutter analyze
      - name: Run Tests
        run: |
          cd mobile/flutter_app
          flutter test
