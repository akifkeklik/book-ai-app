# 🤖 Libris CI/CD Automation Pipeline
# Purpose: High-speed automated verification for every push or PR.

name: Libris Engineering Excellence

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  # ── 🛡️ Backend CI (Python/Flask) ───────────────────────────────────────────
  backend-ci:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip' # Automated caching for faster builds

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest

      - name: Static Analysis (Ruff)
        run: |
          ruff check backend/
        continue-on-error: false

      - name: Execute Pytest Suite
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ── 🛡️ Frontend CI (Flutter/Dart) ──────────────────────────────────────────
  frontend-ci:
    name: Mobile App Analysis & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Fetch Pub Dependencies
        run: |
          cd mobile/flutter_app
          flutter pub get

      - name: Structural Analysis
        run: |
          cd mobile/flutter_app
          flutter analyze

      - name: Unit & Widget Tests
        run: |
          cd mobile/flutter_app
          flutter test
