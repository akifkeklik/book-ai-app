name: book_ai_app
description: AI-powered book recommendation app — Goodreads meets machine learning
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Auth & Database ─────────────────────────────────────────────────────────
  supabase_flutter: ^2.3.4

  # ── HTTP networking ─────────────────────────────────────────────────────────
  dio: ^5.4.3

  # ── State management ────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^13.2.3

  # ── Images ──────────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1

  # ── UI ──────────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0

  # ── Storage ─────────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── Utils ───────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.2.6
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
