# 🐍 Libris Python Standards Configuration
# Modern DX: Integrated tooling for testing and linting.

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"

[tool.black]
line-length = 100
target-version = ['py310']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I"]
# E: pycodestyle errors
# F: Pyflakes
# W: pycodestyle warnings
# I: isort
